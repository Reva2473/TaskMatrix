<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A modern to-do app">
    <title>Co-Do</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }

        .hidden-pane {
            display: none !important;
        }

        .glass {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .glass-input {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f8fafc;
            transition: all 0.3s ease;
        }

        .glass-input:focus {
            outline: none;
            border-color: #818cf8;
            box-shadow: 0 0 0 2px rgba(129, 140, 248, 0.3);
            background: rgba(15, 23, 42, 0.8);
        }

        .glass-input option {
            background-color: #1e293b;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            border: none;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(168, 85, 247, 0.5);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .priority-high {
            border-left-color: #ff4757 !important;
        }

        .priority-medium {
            border-left-color: #ffa502 !important;
        }

        .priority-low {
            border-left-color: #2ed573 !important;
        }

        .card-hover:hover {
            transform: translateY(-3px);
            background: rgba(30, 41, 59, 0.8);
        }

        .text-gradient {
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            background:
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(15, 23, 42, 1) 0%, rgba(15, 23, 42, 1) 100%);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body>
    <div class="ambient-bg"></div>

    <nav class="glass border-b-0 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <div class="flex-shrink-0 flex items-center gap-3">
                    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="url(#grad1)" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <defs>
                            <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                    </svg>
                    <div class="flex flex-col">
                        <span class="font-bold text-3xl tracking-tight text-gradient leading-none mb-0.5">Co-Do</span>
                        <span class="text-xs font-medium text-slate-400 tracking-wide uppercase">A modern to-do app</span>
                    </div>
                </div>
                <div class="flex items-center space-x-6">
                    <span id="user-greeting" class="hidden-pane text-sm font-medium text-slate-300"></span>
                    <button id="logout-btn"
                        class="hidden-pane btn-secondary px-5 py-2 rounded-lg text-sm font-semibold hover:text-white transition-colors text-slate-300">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <div id="auth-view" class="max-w-md mx-auto mt-16 glass p-10 rounded-2xl fade-in">
            <div class="text-center mb-10">
                <h2 id="auth-title" class="text-4xl font-bold mb-3 text-white">Welcome Back</h2>
                <p class="text-sm text-slate-400">
                    <a href="#" id="toggle-auth" class="text-indigo-400 hover:text-indigo-300 transition-colors">Don't
                        have an account? Register</a>
                </p>
            </div>

            <form id="auth-form" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Username</label>
                    <input type="text" id="username" required
                        class="glass-input block w-full px-4 py-3 rounded-xl sm:text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Password</label>
                    <input type="password" id="password" required
                        class="glass-input block w-full px-4 py-3 rounded-xl sm:text-sm">
                </div>
                <button type="submit" id="auth-submit-btn"
                    class="w-full btn-primary flex justify-center py-3.5 px-4 rounded-xl text-md font-bold text-white mt-8">
                    Sign In
                </button>
            </form>
            <div id="auth-error"
                class="mt-6 text-sm text-red-400 font-medium text-center hidden-pane bg-red-400/10 py-2 rounded-lg border border-red-400/20">
            </div>
        </div>

        <div id="dashboard-view" class="hidden-pane fade-in">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

                <div class="lg:col-span-2 space-y-6">
                    <div class="glass rounded-2xl overflow-hidden flex flex-col h-[700px]">
                        <div class="px-8 py-6 border-b border-white/5 flex justify-between items-center bg-white/5">
                            <h3 class="text-2xl font-bold text-white flex items-center gap-3">
                                <svg width="24" height="24" fill="none" class="text-indigo-400" stroke="currentColor"
                                    stroke-width="2" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01">
                                    </path>
                                </svg>
                                My Tasks
                            </h3>
                            <button id="show-task-modal-btn"
                                class="btn-primary px-5 py-2.5 rounded-lg text-sm font-bold flex items-center gap-2">
                                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M12 4v16m8-8H4" />
                                </svg>
                                New Task
                            </button>
                        </div>
                        <div id="task-list" class="flex-1 overflow-y-auto p-4 space-y-4">
                            <div class="p-8 text-center text-slate-400 font-medium">Loading your tasks...</div>
                        </div>
                    </div>
                </div>

                <div class="space-y-6">
                    <div class="glass rounded-2xl overflow-hidden flex flex-col max-h-[700px]">
                        <div class="px-8 py-6 border-b border-white/5 bg-white/5 flex justify-between items-center">
                            <h3 class="text-2xl font-bold text-white flex items-center gap-3">
                                <svg width="24" height="24" fill="none" class="text-purple-400" stroke="currentColor"
                                    stroke-width="2" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z">
                                    </path>
                                </svg>
                                Groups
                            </h3>
                            <button id="show-group-modal-btn"
                                class="btn-secondary px-3 py-1.5 rounded-lg text-sm font-semibold text-slate-200">
                                + Create
                            </button>
                        </div>
                        <div id="group-list" class="flex-1 overflow-y-auto p-4 space-y-4">
                            <div class="p-8 text-center text-slate-400 font-medium">Loading your groups...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="edit-task-modal" class="hidden-pane fixed inset-0 z-50 overflow-y-auto">
        <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:p-0">
            <div class="fixed inset-0 transition-opacity bg-slate-900/80 backdrop-blur-sm" id="edit-task-modal-bg">
            </div>
            <div
                class="inline-block glass rounded-2xl text-left overflow-hidden shadow-2xl transform transition-all sm:my-8 align-middle sm:max-w-lg w-full border border-white/10 z-50 fade-in">
                <form id="edit-task-form">
                    <input type="hidden" id="edit-task-id">
                    <div class="px-8 pt-8 pb-6 space-y-5">
                        <h3 class="text-2xl font-bold text-white mb-6">Edit Task</h3>
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-2">Title</label>
                            <input type="text" id="edit-task-title" required
                                class="glass-input block w-full px-4 py-3 rounded-xl sm:text-sm">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-2">Description</label>
                            <textarea id="edit-task-desc" rows="3"
                                class="glass-input block w-full px-4 py-3 rounded-xl sm:text-sm"></textarea>
                        </div>
                        <div class="grid grid-cols-2 gap-5">
                            <div>
                                <label class="block text-sm font-medium text-slate-300 mb-2">Due Date</label>
                                <input type="date" id="edit-task-date"
                                    class="glass-input block w-full px-4 py-3 rounded-xl sm:text-sm">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-300 mb-2">Priority</label>
                                <select id="edit-task-priority"
                                    class="glass-input block w-full px-4 py-3 rounded-xl sm:text-sm">
                                    <option value="Low">Low</option>
                                    <option value="Medium">Medium</option>
                                    <option value="High">High</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-2">Image URL (Optional)</label>
                            <input type="url" id="edit-task-image" placeholder="https://..."
                                class="glass-input block w-full px-4 py-3 rounded-xl sm:text-sm">
                        </div>
                    </div>
                    <div class="px-8 py-6 bg-slate-900/50 flex flex-row-reverse gap-3 border-t border-white/5">
                        <button type="submit"
                            class="btn-primary w-auto inline-flex justify-center rounded-xl px-6 py-2.5 text-sm font-bold text-white">Save
                            Changes</button>
                        <button type="button" id="close-edit-task-modal-btn"
                            class="btn-secondary w-auto inline-flex justify-center rounded-xl px-6 py-2.5 text-sm font-bold text-slate-300">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div id="task-modal" class="hidden-pane fixed inset-0 z-50 overflow-y-auto">
        <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:p-0">
            <div class="fixed inset-0 transition-opacity bg-slate-900/80 backdrop-blur-sm" id="task-modal-bg"></div>
            <div
                class="inline-block glass rounded-2xl text-left overflow-hidden shadow-2xl transform transition-all sm:my-8 align-middle sm:max-w-lg w-full border border-white/10 z-50 fade-in">
                <form id="task-form">
                    <div class="px-8 pt-8 pb-6 space-y-5">
                        <h3 class="text-2xl font-bold text-white mb-6">Create New Task</h3>
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-2">Title</label>
                            <input type="text" id="task-title" required
                                class="glass-input block w-full px-4 py-3 rounded-xl sm:text-sm">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-2">Description</label>
                            <textarea id="task-desc" rows="3"
                                class="glass-input block w-full px-4 py-3 rounded-xl sm:text-sm"></textarea>
                        </div>
                        <div class="grid grid-cols-2 gap-5">
                            <div>
                                <label class="block text-sm font-medium text-slate-300 mb-2">Due Date</label>
                                <input type="date" id="task-date"
                                    class="glass-input block w-full px-4 py-3 rounded-xl sm:text-sm">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-300 mb-2">Priority</label>
                                <select id="task-priority"
                                    class="glass-input block w-full px-4 py-3 rounded-xl sm:text-sm">
                                    <option value="Low">Low</option>
                                    <option value="Medium" selected>Medium</option>
                                    <option value="High">High</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-2">Image URL (Optional)</label>
                            <input type="url" id="task-image" placeholder="https://..."
                                class="glass-input block w-full px-4 py-3 rounded-xl sm:text-sm">
                        </div>
                    </div>
                    <div class="px-8 py-6 bg-slate-900/50 flex flex-row-reverse gap-3 border-t border-white/5">
                        <button type="submit"
                            class="btn-primary w-auto inline-flex justify-center rounded-xl px-6 py-2.5 text-sm font-bold text-white">Save
                            Task</button>
                        <button type="button" id="close-task-modal-btn"
                            class="btn-secondary w-auto inline-flex justify-center rounded-xl px-6 py-2.5 text-sm font-bold text-slate-300">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div id="group-modal" class="hidden-pane fixed inset-0 z-50 overflow-y-auto">
        <div class="flex items-center justify-center min-h-screen px-4 text-center sm:p-0">
            <div class="fixed inset-0 transition-opacity bg-slate-900/80 backdrop-blur-sm" id="group-modal-bg"></div>
            <div
                class="inline-block glass rounded-2xl text-left overflow-hidden shadow-2xl transform transition-all sm:max-w-md w-full border border-white/10 z-50 fade-in">
                <form id="group-form">
                    <div class="px-8 pt-8 pb-6 space-y-5">
                        <h3 class="text-2xl font-bold text-white mb-4">Create New Group</h3>
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-2">Group Name</label>
                            <input type="text" id="group-name" required
                                class="glass-input block w-full px-4 py-3 rounded-xl sm:text-sm">
                        </div>
                    </div>
                    <div class="px-8 py-6 bg-slate-900/50 flex flex-row-reverse gap-3 border-t border-white/5">
                        <button type="submit"
                            class="btn-primary w-auto inline-flex justify-center rounded-xl px-6 py-2.5 text-sm font-bold text-white">Create
                            Group</button>
                        <button type="button" id="close-group-modal-btn"
                            class="btn-secondary w-auto inline-flex justify-center rounded-xl px-6 py-2.5 text-sm font-bold text-slate-300">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div id="share-group-modal" class="hidden-pane fixed inset-0 z-[60] overflow-y-auto">
        <div class="flex items-center justify-center min-h-screen px-4 text-center sm:p-0">
            <div class="fixed inset-0 transition-opacity bg-slate-900/80 backdrop-blur-sm"></div>
            <div
                class="inline-block glass rounded-2xl text-left overflow-hidden shadow-2xl transform transition-all sm:max-w-md w-full border border-white/10 z-[60] fade-in">
                <form id="share-group-form">
                    <input type="hidden" id="share-group-task-id">
                    <div class="px-8 pt-8 pb-6 space-y-4">
                        <h3 class="text-2xl font-bold text-white mb-2">Send to Group</h3>
                        <p class="text-sm text-slate-400 mb-4">Select a group to share this task with.</p>
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-2">Group</label>
                            <select id="share-group-select" required
                                class="glass-input block w-full px-4 py-3 rounded-xl sm:text-sm">
                            </select>
                        </div>
                    </div>
                    <div class="px-8 py-6 bg-slate-900/50 flex flex-row-reverse gap-3 border-t border-white/5">
                        <button type="submit"
                            class="btn-primary w-auto inline-flex justify-center rounded-xl px-6 py-2.5 text-sm font-bold text-white">Send</button>
                        <button type="button" id="close-share-group-modal-btn"
                            class="btn-secondary w-auto inline-flex justify-center rounded-xl px-6 py-2.5 text-sm font-bold text-slate-300">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div id="action-modal" class="hidden-pane fixed inset-0 z-[60] overflow-y-auto">
        <div class="flex items-center justify-center min-h-screen px-4 text-center sm:p-0">
            <div class="fixed inset-0 transition-opacity bg-slate-900/80 backdrop-blur-sm"></div>
            <div
                class="inline-block glass rounded-2xl text-left overflow-hidden shadow-2xl transform transition-all sm:max-w-md w-full border border-white/10 z-[60] fade-in">
                <div class="px-8 pt-8 pb-6 space-y-4">
                    <h3 id="action-modal-title" class="text-2xl font-bold text-white mb-2">Action Title</h3>
                    <p id="action-modal-desc" class="text-sm text-slate-400 mb-4">Action description.</p>
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-2">Username</label>
                        <input type="text" id="action-modal-input" placeholder="e.g. Test1" required
                            class="glass-input block w-full px-4 py-3 rounded-xl sm:text-sm">
                    </div>
                    <div id="action-modal-error" class="hidden-pane text-sm text-red-400 font-medium py-2 rounded-lg">
                    </div>
                </div>
                <div class="px-8 py-6 bg-slate-900/50 flex flex-row-reverse gap-3 border-t border-white/5">
                    <button type="button" id="action-confirm-btn"
                        class="btn-primary w-auto inline-flex justify-center rounded-xl px-6 py-2.5 text-sm font-bold text-white">Confirm</button>
                    <button type="button" id="action-cancel-btn"
                        class="btn-secondary w-auto inline-flex justify-center rounded-xl px-6 py-2.5 text-sm font-bold text-slate-300">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
